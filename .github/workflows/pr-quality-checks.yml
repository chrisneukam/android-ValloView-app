name: PR Quality Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  pr-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Linting
        run: ./gradlew ktlintCheck

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Generate Dokka
        run: ./gradlew :app:dokkaGenerate

      - name: Build Debug APK
        run: ./gradlew assembleDebug
